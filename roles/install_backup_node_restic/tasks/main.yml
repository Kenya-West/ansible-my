---
# tasks file for roles/install_backup_node_restic

- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"
  tags:
    - always

- name: Validate role scenarios (if provided)
  ansible.builtin.include_tasks: validate_scenarios.yml
  tags:
    - always

- name: Route to scenario tasks when role_scenarios is provided and has entries
  ansible.builtin.include_tasks: "scenarios/{{ item }}.yml"
  with_items: "{{ role_scenarios }}"
  loop_control:
    loop_var: item
  when: role_scenarios is defined and (role_scenarios | length) > 0
  tags:
    - always
