---
# Validate scenarios when `role_scenarios` is provided (flexible checks)

- name: Skip scenarios validation when none provided
  ansible.builtin.debug:
    msg: "No role_scenarios provided; skipping scenarios validation"
  when: role_scenarios is not defined or (role_scenarios | length) == 0
  changed_when: false

- name: Ensure `role_scenarios` is iterable when provided
  ansible.builtin.assert:
    that:
      - "role_scenarios is defined"
      - "role_scenarios is iterable"
    fail_msg: "When provided, `role_scenarios` must be a list (or iterable)."
  when: role_scenarios is defined and (role_scenarios | length) > 0

- name: Validate scenarios length bounds when provided
  ansible.builtin.assert:
    that:
      - "(role_scenarios | length) >= (role_scenarios_min_length | int)"
      - "(role_scenarios | length) <= (role_scenarios_max_length | int)"
    fail_msg: "Provided `role_scenarios` does not meet configured length constraints."
  when: role_scenarios is defined and (role_scenarios | length) > 0

- name: Initialize invalid scenarios list
  ansible.builtin.set_fact:
    invalid_scenarios: []
  when: role_scenarios is defined and (role_scenarios | length) > 0

- name: Get scenarios from files in scenarios/ directory when allowed
  ansible.builtin.find:
    paths: "{{ this_role_path }}/tasks/scenarios"
    patterns: "*.yml"
    file_type: file
  delegate_to: localhost
  register: scenario_files
  when: role_scenarios_allowed_use_files | bool

- name: Get allowed scenarios from files when allowed
  ansible.builtin.set_fact:
    role_scenarios_allowed: "{{ scenario_files.files | map(attribute='path') | map('basename') | map('regex_replace', '\\.yml$', '') | list }}"
  when: role_scenarios_allowed_use_files | bool

- name: Build list of invalid scenarios (non-matching allowed entries)
  ansible.builtin.set_fact:
    invalid_scenarios: "{{ invalid_scenarios + [item] }}"
  loop: "{{ role_scenarios | default([]) }}"
  when:
    - (role_scenarios_allowed | length) > 0
    - not (
        (item is string and item in role_scenarios_allowed)
        or
        (item is mapping and (
          (item.get('name', '') in role_scenarios_allowed)
          or
          (item.get('scenario', '') in role_scenarios_allowed)
        ))
      )

- name: Fail when invalid scenarios are present
  ansible.builtin.assert:
    that:
      - "invalid_scenarios | default([]) | length == 0"
    fail_msg: "role_scenarios contains unrecognized entries: {{ invalid_scenarios }}"
  when: invalid_scenarios is defined and (invalid_scenarios | length) > 0
