---
# defaults file for roles/install_backup_node_restic
project_dir: "{{ backup_restic_node_project_structure_end_dirs.autorestic | ansible.builtin.basename }}"
project_root_dir: "{{ backup_restic_node_project_structure_root }}"
source_asset_rootpath_project: "{{ location_custom_files_path }}/{{ project_root_dir }}"
source_asset_fullpath_project: "{{ source_asset_rootpath_project }}/{{ project_dir }}/"

source_paths_add_role_dirs:
  - templates
source_paths_add_repo_dirs:
  - "{{ source_asset_fullpath_project }}"
source_paths_add_user_dirs: []

dest_path_root: "/home/{{ standard_user }}/{{ backup_restic_node_project_structure_root }}"
dest_path_full: "{{ dest_path_root }}/{{ project_dir }}"

compose_project_name: "{{ project_dir }}"

restic_node_cron_job_name: "Autorestic backup"
restic_node_cron_job_name_forget: "Autorestic forget"
restic_node_cron_job_name_prefix: "/bin/bash -c 'sleep $((RANDOM\\%300))' &&"
restic_node_cron_job_name_suffix: ""
restic_excludes_list_files:
  - excludes-common.txt
  - excludes-dev-build.txt
  - excludes-dev-code.txt
  - excludes-home-dirs.txt
  - excludes-root.txt

cronjob_script_path_without_analytics_autorestic_backup: "{{ restic_node_cron_job_name_prefix | default('') }} {{ dest_path_full }}/scripts/update-cron.sh"
cronjob_script_path_with_analytics_autorestic_backup: "{{ cronjob_script_path_without_analytics_autorestic_backup }}"
cronjob_script_path_without_analytics_autorestic_forget: "{{ dest_path_full }}/scripts/forget.sh"
cronjob_script_path_with_analytics_autorestic_forget: "{{ cronjob_script_path_without_analytics_autorestic_forget }}"

restic_global_forget:
  keep-last: 5
  keep-daily: 4
  keep-weekly: 1
  keep-monthly: 12
  keep-yearly: 7
