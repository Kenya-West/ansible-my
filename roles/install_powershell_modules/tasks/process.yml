- name: Install {{ item.name }} module using pwsh
  ansible.builtin.shell: "Install-Module {{ item.name }} -Scope {{ item.scope | default('AllUsers') }} {% if item.force | default(true) %} -Force {% endif %}"
  args:
    executable: "{{ pwsh_path.stdout }}"
  register: install_result_posh_module
  failed_when: install_result_posh_module.rc != 0