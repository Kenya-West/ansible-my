---
# tasks file for roles/install_vpn_caddy_caddy

- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"

- name: Add to source_paths the current role templates directory
  ansible.builtin.set_fact:
    source_paths: >-
      {{
        (
            source_paths_add_role_dirs
            | default([])
            | map('regex_replace', '^(.*)$', this_role_path ~ '/\1/')
            | list
          )
        + (source_paths_add_repo_dirs | default([]))
        + (source_paths_add_user_dirs | default([]))
      }}

- name: Ensure user is in the 'docker' group
  become: true
  become_user: root
  ansible.builtin.user:
    name: "{{ standard_user }}"
    groups: docker
    append: true

- name: Ensure Docker network 'caddy' exists with specific settings
  community.docker.docker_network:
    name: caddy
    driver: bridge
    state: present

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Mask NGINX service
  become: true
  become_user: root
  ansible.builtin.systemd:
    name: nginx
    masked: true
    enabled: false
  when: "'nginx.service' in ansible_facts.services"

- name: container_stop_down
  ansible.builtin.include_role:
    name: kwtoolset/container_stop_down
  vars:
    container_stop_down_list:
      - "{{ dest_path_full }}"
    docker_compose_project_name_list:
      - "{{ compose_project_name }}"
      - "{{ project_dir }}"

- name: copy_files_templating
  ansible.builtin.include_role:
    name: kwtoolset/copy_files_templating
  vars:
    copy_files_templating_dir_list:
      - src: "{{ source_path }}"
        dest: "{{ dest_path_full }}"
        default_mode: "0775"
  with_items: "{{ source_paths }}"
  loop_control:
    loop_var: source_path

- name: unzip
  ansible.builtin.include_role:
    name: kwtoolset/unzip
  vars:
    unzip_source: "{{ dest_path_full }}/static/sni-templates-main.tar.gz"
    unzip_dest: "{{ dest_path_full }}/static/sni-templates"
    unzip_remove_source: true
    unzip_checksum: true

- name: container_pull
  ansible.builtin.include_role:
    name: kwtoolset/container_pull
  vars:
    container_pull_list:
      - path: "{{ dest_path_full }}"
        name: "{{ compose_project_name }}"
        policy: "policy"

- name: container_up
  ansible.builtin.include_role:
    name: kwtoolset/container_up
  vars:
    container_up_list:
      - path: "{{ dest_path_full }}"
        name: "{{ compose_project_name }}"
        ignore_errors: false

- name: Place an original templated Caddyfile as .bak just for debugging
  ansible.builtin.template:
    src: "{{ item }}/config/base/Caddyfile.j2"
    dest: "{{ dest_path_full }}/config/base/Caddyfile.bak"
    owner: "{{ standard_user }}"
    group: "{{ standard_user }}"
    mode: "0644"
  with_items: "{{ source_paths }}"
  failed_when: false