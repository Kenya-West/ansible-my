---
# tasks file for roles/install_vpn_caddy_caddy

- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"
  tags:
    - always

- name: Add to source_paths the current role templates directory
  ansible.builtin.set_fact:
    source_paths: >-
      {{
        (
            source_paths_add_role_dirs
            | default([])
            | map('regex_replace', '^(.*)$', this_role_path ~ '/\1/')
            | list
          )
        + (source_paths_add_repo_dirs | default([]))
        + (source_paths_add_user_dirs | default([]))
      }}
  tags:
    - always

- name: Ensure user is in the 'docker' group
  become: true
  become_user: root
  ansible.builtin.user:
    name: "{{ standard_user }}"
    groups: docker
    append: true

- name: Ensure Docker network 'caddy' exists with specific settings
  community.docker.docker_network:
    name: caddy
    driver: bridge
    state: present

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Mask NGINX service
  become: true
  become_user: root
  ansible.builtin.systemd:
    name: nginx
    masked: true
    enabled: false
  when: "'nginx.service' in ansible_facts.services"

- name: "Create non-existent parent directories for {{ dest_path_full }}"
  ansible.builtin.include_role:
    name: ./roles/kwtoolset/create_dirs_traversal
    apply:
      tags:
        - update_config
  vars:
    create_dirs_traversal_path: "{{ dest_path_full }}"
    create_dirs_traversal_strip_leaf: true
    create_dirs_force_mode: "0775"
  tags:
    - update_config

- name: copy_files_templating
  ansible.builtin.include_role:
    name: kwtoolset/copy_files_templating
    apply:
      tags:
        - update_config
  vars:
    copy_files_templating_dir_list:
      - src: "{{ source_path }}"
        dest: "{{ dest_path_full }}"
        default_mode: "0775"
  with_items: "{{ source_paths }}"
  loop_control:
    loop_var: source_path
  tags:
    - update_config

- name: unzip
  ansible.builtin.include_role:
    name: kwtoolset/unzip
  vars:
    unzip_source: "{{ dest_path_full }}/static/sni-templates-main.tar.gz"
    unzip_dest: "{{ dest_path_full }}/static/sni-templates"
    unzip_remove_source: true
    unzip_checksum: true

- name: compose_pull
  ansible.builtin.include_role:
    name: kwtoolset/compose_pull
    apply:
      tags:
        - update_image
  vars:
    project_paths:
      - "{{ dest_path_full }}"
  tags:
    - update_image

- name: compose_down
  ansible.builtin.include_role:
    name: kwtoolset/compose_down
    apply:
      tags:
        - update_image
        - update_config
  vars:
    project_paths:
      - "{{ dest_path_full }}"
  tags:
    - update_image
    - update_config

- name: compose_up
  ansible.builtin.include_role:
    name: kwtoolset/compose_up
    apply:
      tags:
        - update_image
        - update_config
  vars:
    project_paths:
      - "{{ dest_path_full }}"
  tags:
    - update_image
    - update_config

- name: Place an original templated Caddyfile as .bak just for debugging
  ansible.builtin.template:
    src: "{{ item }}/config/base/Caddyfile.j2"
    dest: "{{ dest_path_full }}/config/base/Caddyfile.bak"
    owner: "{{ standard_user }}"
    group: "{{ standard_user }}"
    mode: "0644"
  with_items: "{{ source_paths }}"
  failed_when: false