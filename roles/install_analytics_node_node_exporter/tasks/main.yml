---
# tasks file for roles/install_analytics_node_node_exporter
- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"
  tags:
    - always

- name: Add to source_paths the current role templates directory
  ansible.builtin.set_fact:
    source_paths: >-
      {{
        (
            source_paths_add_role_dirs
            | default([])
            | map('regex_replace', '^(.*)$', this_role_path ~ '/\1/')
            | list
          )
        + (source_paths_add_repo_dirs | default([]))
        + (source_paths_add_user_dirs | default([]))
      }}
  tags:
    - always

- name: "Create non-existent parent directories for {{ dest_path_full }}"
  ansible.builtin.include_role:
    name: ./roles/kwtoolset/create_dirs_traversal
    apply:
      tags:
        - update_config
  vars:
    create_dirs_traversal_path: "{{ dest_path_full }}"
    create_dirs_traversal_strip_leaf: true
    create_dirs_force_mode: "0775"
  tags:
    - update_config

- name: copy_files_templating
  ansible.builtin.include_role:
    name: kwtoolset/copy_files_templating
    apply:
      tags:
        - update_config
  vars:
    copy_files_templating_dir_list:
      - src: "{{ source_path }}"
        dest: "{{ dest_path_full }}"
        default_mode: "0775"
  with_items: "{{ source_paths }}"
  loop_control:
    loop_var: source_path
  tags:
    - update_config

- block:
    - name: Install Node Exporter
      ansible.builtin.include_role:
        name: prometheus.prometheus.node_exporter
  become: true
  become_user: root

- name: Add port {{ node_exporter_web_listen_address_port_internal | default('') }} to UFW from Docker network
  become: true
  become_user: root
  community.general.ufw:
    rule: allow
    direction: in
    proto: tcp
    from_ip: 172.16.0.0/12
    to_port: "{{ node_exporter_web_listen_address_port_internal | default(omit) }}"
  when:
    - node_exporter_web_listen_address_host is defined
    - node_exporter_web_listen_address_host | regex_search('^172')
    - node_exporter_web_listen_address_port_internal is defined