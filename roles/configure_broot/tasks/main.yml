---
# tasks file for roles/configure_broot
- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"

- name: Add to source_paths the current role templates directory
  ansible.builtin.set_fact:
    source_paths: >-
      {{
        (
            source_paths_add_role_dirs
            | default([])
            | map('regex_replace', '^(.*)$', this_role_path ~ '/\1/')
            | list
          )
        + (source_paths_add_repo_dirs | default([]))
        + (source_paths_add_user_dirs | default([]))
      }}

- name: Ensure broot directory exists
  ansible.builtin.file:
    path: "{{ dest_path_root }}"
    state: directory
    owner: "{{ standard_user }}"
    group: "{{ standard_user }}"
    mode: "0775"

- name: Check if broot is installed
  ansible.builtin.shell: command -v broot
  register: broot_path
  failed_when: broot_path.stdout == ""

- name: Launch broot to install in shell
  ansible.builtin.shell: broot --install

- name: Launch broot to populate configuration
  ansible.builtin.shell: "broot --write-default-conf {{ dest_path_root }}"

- name: Copy config for broot from common assets
  ansible.builtin.template:
    src: "{{ item }}/conf.hjson.j2"
    dest: "{{ dest_path_root }}/conf.hjson"
    owner: "{{ standard_user }}"
    group: "{{ standard_user }}"
    mode: "0775"
  with_items: "{{ source_paths }}"
  failed_when: false

- name: Create skins directory
  ansible.builtin.file:
    path: "{{ dest_path_root }}/skins"
    state: directory
    owner: "{{ standard_user }}"
    group: "{{ standard_user }}"
    mode: "0700"
- name: Copy colorscheme for broot from common assets
  ansible.builtin.template:
    src: "{{ item }}/skins/kwtheme.hjson.j2"
    dest: "{{ dest_path_root }}/skins/kwtheme.hjson"
    owner: "{{ standard_user }}"
    group: "{{ standard_user }}"
    mode: "0775"
  with_items: "{{ source_paths }}"
  failed_when: false
