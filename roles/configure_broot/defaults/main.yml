---
# defaults file for roles/configure_broot
project_dir: "{{ general_vps_prepare_project_structure_end_dirs.broot | ansible.builtin.basename }}"
project_root_dir: "{{ general_vps_prepare_project_structure_root }}"
source_asset_rootpath_project: "{{ location_custom_files_path }}/{{ project_root_dir }}"
source_asset_fullpath_project: "{{ source_asset_rootpath_project }}/{{ project_dir }}/"

source_paths_add_role_dirs:
  - templates
source_paths_add_repo_dirs:
  - "{{ source_asset_fullpath_project }}"
source_paths_add_user_dirs: []

dest_path_root: "/home/{{ standard_user }}/.config/broot"
dest_path_full: "{{ dest_path_root }}"