---
# defaults file for roles/git_sync
role_state: present

project_dir: "{{ git_sync_project_structure_end_dirs.mirror | ansible.builtin.basename }}"
project_root_dir: "{{ git_sync_project_structure_root }}"
source_asset_rootpath_project: "{{ location_custom_files_path }}/{{ project_root_dir }}"
source_asset_fullpath_project: "{{ source_asset_rootpath_project }}/{{ project_dir }}/"

source_paths_add_role_dirs:
  - files
  - templates
source_paths_add_repo_dirs:
  - "{{ source_asset_fullpath_project }}"
source_paths_add_user_dirs: []

dest_path_root: "/home/{{ standard_user }}/{{ git_sync_project_structure_root }}"
dest_path_full: "{{ dest_path_root }}/{{ project_dir }}"

cron_job_name_prefix: "Git Sync:"
cron_job_name: ""
cron_job_role_prefix: "/bin/bash -c 'sleep $((RANDOM\\%300))' &&"
cron_job_role_suffix: ""

# This is just a template that should be created per config in git_sync_configs list. It should be set in the role.
cronjob_base_script: "{{ dest_path_full }}/scripts/script.sh --config {{ dest_path_full }}/config/example.conf --verbose"
# fallback. Should be set in role
cronjob_base_script_with_analytics: "{{ cronjob_base_script }}"