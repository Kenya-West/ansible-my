---
# tasks file for roles/install_packages_python_concurrent
- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"
  tags:
    - always

- name: Add to source_paths the current role templates directory
  ansible.builtin.set_fact:
    source_paths: >-
      {{
        (
            source_paths_add_role_dirs
            | default([])
            | map('regex_replace', '^(.*)$', this_role_path ~ '/\1/')
            | list
          )
        + (source_paths_add_repo_dirs | default([]))
        + (source_paths_add_user_dirs | default([]))
      }}
  tags:
    - always

- name: Check that GNU parallel is installed
  ansible.builtin.command: parallel --version
  register: parallel_cmds_package_check
  changed_when: false
  failed_when: parallel_cmds_package_check.rc != 0 or 'GNU parallel' not in parallel_cmds_package_check.stdout
  tags:
    - always

- name: Create non-existent parent directories for {{ dest_path_full }}
  ansible.builtin.include_role:
    name: ./roles/kwtoolset/create_dirs_traversal
    apply:
      tags:
        - update_config
  vars:
    create_dirs_traversal_path: "{{ dest_path_full }}"
    create_dirs_traversal_strip_leaf: false
  tags:
    - update_config

- name: copy_files_templating
  ansible.builtin.include_role:
    name: kwtoolset/copy_files_templating
    apply:
      tags:
        - update_config
  vars:
    copy_files_templating_dir_list:
      - src: "{{ source_path }}"
        dest: "{{ dest_path_full }}"
        default_mode: "0775"
  with_items: "{{ source_paths }}"
  loop_control:
    loop_var: source_path
  tags:
    - update_config

- name: Run commands in parallel for all packages
  ansible.builtin.command: "{{ dest_path_full }}/scripts/run-parallel-cmds.sh --prepend 'uv tool install' --logs --timeout {{ packages_binary_timeout }} -f {{ dest_path_full }}/files/commands.txt -o {{ dest_path_full }}/files/results/results.json"
  register: parallel_cmds_result
  failed_when: false
  tags:
    - update_packages

- name: Fail if results.json is absent
  ansible.builtin.stat:
    path: "{{ dest_path_full }}/files/results/results.json"
  register: results_file
  failed_when: not results_file.stat.exists
  tags:
    - update_packages

- name: Fail if results.json is older than 1 minute (meaning the command likely failed to run properly)
  ansible.builtin.stat:
    path: "{{ dest_path_full }}/files/results/results.json"
  register: results_file
  failed_when: results_file.stat.exists and (ansible_date_time.epoch | int) - (results_file.stat.mtime | int) > 60
  tags:
    - update_packages

- name: Read results.json
  ansible.builtin.slurp:
    src: "{{ dest_path_full }}/files/results/results.json"
  register: results_json_raw
  tags:
    - update_packages

- name: Parse results.json
  ansible.builtin.set_fact:
    parallel_cmds_results_data: "{{ results_json_raw.content | b64decode | from_json }}"
  tags:
    - update_packages

- name: Show results summary
  ansible.builtin.debug:
    msg: >-
      Parallel install results:
      total={{ parallel_cmds_results_data.summary.total }},
      succeeded={{ parallel_cmds_results_data.summary.succeeded }},
      failed={{ parallel_cmds_results_data.summary.failed }},
      timed_out={{ parallel_cmds_results_data.summary.timed_out | default(0) }},
      elapsed={{ parallel_cmds_results_data.summary.elapsed | default('n/a') }}
  tags:
    - update_packages

- name: Build list of failed commands
  ansible.builtin.set_fact:
    parallel_cmds_failed_commands: >-
      {{ parallel_cmds_results_data.results
         | rejectattr('exit_code', 'equalto', 0)
         | list }}
  tags:
    - update_packages

- name: Show failed commands
  ansible.builtin.fail:
    msg: "exit_code={{ item.exit_code }}{{ ' (timed out)' if item.timed_out | default(false) else '' }}  {{ item.command }}"
  loop: "{{ parallel_cmds_failed_commands }}"
  loop_control:
    label: "{{ item.command }}"
  when: parallel_cmds_failed_commands | length > 0
  ignore_errors: true
  tags:
    - update_packages

- name: Empty variable to collect installed binary locations
  set_fact:
    parallel_cmds_results_data: {}
    parallel_cmds_failed_commands: []
  tags:
    - always
    - update_packages
