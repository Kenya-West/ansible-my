- name: Get compose project safely
  block:
    - name: Get compose project
      ansible.builtin.include_role:
        name: kwtoolset/get_compose_project
      vars:
        get_compose_project_dir: "{{ item }}"
  rescue:
    - name: Show an error if no result
      ansible.builtin.debug:
        msg: "Could not get compose project name for project at {{ item }}. It could be the missing docker-compose.yml file or project directory. Skipping."

- name: Docker Compose project - container_stop
  community.docker.docker_compose_v2:
    project_src: "{{ item }}"
    project_name: "{{ get_compose_project_name }}"
    files:
      - docker-compose.yml
    state: absent
  when: get_compose_project_name is defined
  failed_when: false
