
- name: Skip scenarios validation when none provided
  ansible.builtin.debug:
    msg: "No scenarios provided; skipping scenarios validation"
  when: _scenarios is not defined or (_scenarios | length) == 0
  changed_when: false

- name: Ensure `scenarios` is iterable when provided
  ansible.builtin.assert:
    that:
      - "_scenarios is defined"
      - "_scenarios is iterable"
    fail_msg: "When provided, `scenarios` must be a list (or iterable)."
  when: _scenarios is defined and (_scenarios | length) > 0

- name: Validate scenarios length bounds when provided
  ansible.builtin.assert:
    that:
      - "(_scenarios | length) >= (_scenarios_min_length | int)"
      - "(_scenarios | length) <= (_scenarios_max_length | int)"
    fail_msg: "Provided `scenarios` does not meet configured length constraints."
  when: _scenarios is defined and (_scenarios | length) > 0

- name: Initialize invalid scenarios list
  ansible.builtin.set_fact:
    _scenarios_invalid: []
  when: _scenarios is defined and (_scenarios | length) > 0

- name: Get scenarios from files in scenarios directory when allowed
  ansible.builtin.find:
    paths: "{{ _scenarios_parent_role_path }}/tasks/{{ _scenarios_dir_name }}"
    patterns: "*.yml"
    file_type: file
  delegate_to: localhost
  register: scenario_files
  when: _scenarios_allowed_use_files | bool

- name: Get allowed scenarios from files if use files option is enabled
  ansible.builtin.set_fact:
    _scenarios_allowed: "{{ scenario_files.files | map(attribute='path') | map('basename') | map('regex_replace', '\\.yml$', '') | list }}"
  when: _scenarios_allowed_use_files | bool

- name: Build list of invalid scenarios (non-matching allowed entries)
  ansible.builtin.set_fact:
    _scenarios_invalid: "{{ _scenarios | difference(_scenarios_allowed | default([])) }}"
  when: _scenarios is defined and (_scenarios | length) > 0

- name: Fail when invalid scenarios are present
  ansible.builtin.assert:
    that:
      - "_scenarios_invalid | default([]) | length == 0"
    fail_msg: "scenarios contains unrecognized entries: {{ _scenarios_invalid }}"
  when: _scenarios_invalid is defined and (_scenarios_invalid | length) > 0
