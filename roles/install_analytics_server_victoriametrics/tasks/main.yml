---
# tasks file for roles/install_analytics_server_victoriametrics

- name: Capture this role's path so nested role can use the parent role_path
  ansible.builtin.set_fact:
    this_role_path: "{{ role_path }}"
  tags:
    - always

- name: Add to source_paths the current role templates directory
  ansible.builtin.set_fact:
    source_paths: >-
      {{
        (
            source_paths_add_role_dirs
            | default([])
            | map('regex_replace', '^(.*)$', this_role_path ~ '/\1/')
            | list
          )
        + (source_paths_add_repo_dirs | default([]))
        + (source_paths_add_user_dirs | default([]))
      }}
  tags:
    - always

- name: compose_pull
  ansible.builtin.include_role:
    name: kwtoolset/compose_pull
    apply:
      tags:
        - update_image
  vars:
    project_paths:
      - "{{ dest_path_full }}"
  tags:
    - update_image
- name: compose_down
  ansible.builtin.include_role:
    name: kwtoolset/compose_down
    apply:
      tags:
        - update_image
        - update_config
  vars:
    project_paths:
      - "{{ dest_path_full }}"
  tags:
    - update_image
    - update_config
- name: copy_files_templating
  ansible.builtin.include_role:
    name: kwtoolset/copy_files_templating
    apply:
      tags:
        - update_config
  vars:
    copy_files_templating_dir_list:
      - src: "{{ source_path }}"
        dest: "{{ dest_path_full }}"
        default_mode: "0775"
  with_items: "{{ source_paths }}"
  loop_control:
    loop_var: source_path
  tags:
    - update_config
- name: compose_up
  ansible.builtin.include_role:
    name: kwtoolset/compose_up
    apply:
      tags:
        - update_image
        - update_config
  vars:
    project_paths:
      - "{{ dest_path_full }}"
  tags:
    - update_image
    - update_config

- name: Add port {{ victoriametrics_external_port }} to UFW
  become: true
  become_user: root
  community.general.ufw:
    rule: allow
    port: "{{ victoriametrics_external_port }}"
    proto: tcp
  when:
    - victoriametrics_external_port is defined
    - victoriametrics_external_port | length > 0