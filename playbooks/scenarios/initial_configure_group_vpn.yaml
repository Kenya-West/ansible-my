---

- name: Run initial configuration tasks
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Include initial configuration user input emails playbook
      include_tasks: ansible/secrets/input_data_emails.yaml
    - name: Include initial configuration user input tokens playbook
      include_tasks: ansible/secrets/input_data_tokens.yaml
    - name: Include initial configuration secrets playbook
      include_tasks: ansible/secrets/secrets.yaml
    - name: Include initial configuration populate common secrets playbook
      include_tasks: ansible/secrets/populate_common_secrets.yaml

