---
# Step 1: Bootstrap VPS preparation
- import_playbook: ../bootstrap/general_vps_prepare_add_users.yaml
- import_playbook: ../bootstrap/general_vps_prepare_add_keys.yaml
- import_playbook: ../bootstrap/general_vps_prepare_add_ssh_ports.yaml
- import_playbook: ../bootstrap/general_vps_prepare_disable_password_auth.yaml
- import_playbook: ../bootstrap/general_vps_prepare_fail2ban.yaml

# Step 2: System maintenance
- import_playbook: ../maintenance/general_vps_prepare_update.yaml
- import_playbook: ../maintenance/general_vps_prepare_reboot.yaml

# Delay for reconnection
- hosts: all
  gather_facts: no
  tasks:
    - name: Wait 30 seconds for system to reconnect
      pause:
        seconds: 30

# Step 3: Base packages and configuration
- import_playbook: ../base/general_vps_prepare_install_packages.yaml
  vars:
    become_user: "{{ standard_user }}"
