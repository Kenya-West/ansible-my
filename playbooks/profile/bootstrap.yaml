---
# Step 1: Bootstrap VPS preparation
- import_playbook: ../bootstrap/users.yaml
- import_playbook: ../bootstrap/keys.yaml
- import_playbook: ../bootstrap/ssh_ports.yaml
- import_playbook: ../bootstrap/disable_password_auth.yaml
- import_playbook: ../bootstrap/fail2ban.yaml

# Step 2: System maintenance
- import_playbook: ../maintenance/update.yaml
- import_playbook: ../maintenance/reboot.yaml

# Delay for reconnection
- hosts: all
  gather_facts: no
  tasks:
    - name: Wait 30 seconds for system to reconnect
      pause:
        seconds: 30

# Step 3: Base packages and configuration
- import_playbook: ../base/packages.yaml
  vars:
    become_user: "{{ standard_user }}"
- import_playbook: ../base/eget.yaml
  vars:
    become_user: "{{ standard_user }}"
