alertmanager_route:
  receiver: telepush
  group_by:
    - alertname
    - instance
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

alertmanager_receivers_list:
  - name: telepush
    webhook_configs:
    - url: 'https://telepush.dev/api/inlets/alertmanager/<token>'
    http_config:

  - name: telepush_local
    webhook_configs:
    - url: 'https://{{ domains_keys.main }}/{{ path_to_internal_services_predefined_full }}/telepush/api/inlets/alertmanager/<Telepush token like 12345>'
  - name: telegram
    telegram_configs:
      - bot_token: "{{ telepush_bot_token }}"
        api_url: https://api.telegram.org
        chat_id: <Telegram chat id like -1001234567890>
        message_thread_id: <Telegram topic id> # Optional, if you want to use topic_id

  - name: telegram
    telegram_configs:
      - bot_token: <token>
        api_url: https://api.telegram.org
        chat_id: <chatId_digits>
        message_thread_id: '<topic_id>' # Optional, if you want to use topic_id
